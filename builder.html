<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Builder | Builder</title>
    <link rel="stylesheet" href="builder.css" />
  </head>

  <body>
    <div class="app">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="user-info">
          <img
            src="https://img.freepik.com/premium-vector/portrait-business-woman_505024-2799.jpg?semt=ais_hybrid&w=740&q=80"
          />
          <div class="user-text">
            <h3>SAKSHI</h3>
            <span>Portfolio Creator</span>
          </div>
        </div>

        <nav>
          <a href="dashboard.html">Home</a>
          <a href="templates.html">Templates</a>
          <a href="builder.html" class="active">Build Resume</a>
          <a href="profile.html">Profile</a>
          <a href="contact.html">Contact</a>
          <a href="about.html">About</a>
          <a href="FAQ.html">FAQ</a>
        </nav>

        <button class="logout" onclick="logoutUser()">Logout</button>
      </aside>

      <!-- Main Content -->
      <main class="content">
        <section class="builder-intro">
          <h2>Create Your Professional Resume</h2>
          <p>Text areas will expand automatically as you type.</p>
        </section>

        <section class="builder-form">
          <!-- PERSONAL DETAILS -->
          <div class="form-card">
            <h3>Personal Details</h3>

            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="fullName" />
            </div>

            <div class="form-group">
              <label>Title / Profession</label>
              <input type="text" id="title" />
            </div>

            <div class="form-group">
              <label>Email</label>
              <input type="email" id="email" />
            </div>

            <div class="form-group">
              <label>Phone</label>
              <input type="text" id="phone" />
            </div>
          </div>

          <!-- PROFESSIONAL SUMMARY -->
          <div class="form-card">
            <h3>Professional Summary</h3>
            <textarea id="summary"></textarea>
          </div>

          <!-- SKILLS -->
          <div class="form-card">
            <h3>Skills</h3>
            <textarea id="skills"></textarea>
          </div>

          <!-- WORK EXPERIENCE -->
          <div class="form-card">
            <h3>Work Experience</h3>
            <textarea id="experience"></textarea>
          </div>

          <!-- PROJECTS -->
          <div class="form-card">
            <h3>Projects</h3>
            <textarea id="projects"></textarea>
          </div>

          <!-- EDUCATION -->
          <div class="form-card">
            <h3>Education</h3>
            <textarea id="education"></textarea>
          </div>

          <!-- CERTIFICATIONS -->
          <div class="form-card">
            <h3>Certifications</h3>
            <textarea id="certifications"></textarea>
          </div>

          <!-- LINKS -->
          <div class="form-card">
            <h3>Links</h3>

            <div class="form-group">
              <label>LinkedIn</label>
              <input type="text" id="linkedin" />
            </div>

            <div class="form-group">
              <label>GitHub</label>
              <input type="text" id="github" />
            </div>

            <div class="form-group">
              <label>Website</label>
              <input type="text" id="website" />
            </div>
          </div>

          <!-- ACTION -->
          <div class="form-card action-card">
            <button class="primary" onclick="savePortfolio()">
              Save Resume
            </button>

            <!-- ✅ Message box -->
            <div id="resumeMessage" class="message"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="builder.js"></script>
  </body>
</html>
