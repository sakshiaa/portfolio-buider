<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Select Portfolio Template</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        margin: 0;
        
        padding: 40px;
        background: #f0f2f5;
      }

      h1 {
        text-align: center;
        font-size: 2.2rem;
        margin-bottom: 50px;
        color: #333;
      }

      /* Masonry grid */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 25px;
        max-width: 1200px;
        margin: auto;
      }

      .card {
        background: #fff;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
        cursor: pointer;
        display: flex;
        flex-direction: column;
      }

      .card:hover {
        transform: translateY(-10px) scale(1.02);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      }

      .card img {
        width: 100%;
        height: auto;
        object-fit: cover;
        display: block;
      }

      .card-content {
        padding: 20px;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .card h3 {
        margin: 0 0 15px 0;
        font-size: 1.3rem;
        color: #4b4b4b;
      }

      .card button {
        padding: 12px 20px;
        border: none;
        background: #6c63ff;
        color: #fff;
        border-radius: 30px;
        font-size: 1rem;
        transition: background 0.3s ease;
        cursor: pointer;
        align-self: center;
      }

      .card button:hover {
        background: #574fd6;
      }

      /* Responsive */
      @media (max-width: 1000px) {
        .grid {
          grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        }
      }

      @media (max-width: 600px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <h1>Choose a Portfolio Template</h1>

    <div class="grid">
      <div class="card" onclick="selectTemplate('template1')">
        <div class="card-content">
          <h3>Classic Portfolio</h3>
          <button>Use Template</button>
        </div>
      </div>

      <div class="card" onclick="selectTemplate('template2')">
        <div class="card-content">
          <h3>Professional Portfolio</h3>
          <button>Use Template</button>
        </div>
      </div>

      <div class="card" onclick="selectTemplate('template3')">
        <div class="card-content">
          <h3>Modern Portfolio</h3>
          <button>Use Template</button>
        </div>
      </div>

      <div class="card" onclick="selectTemplate('template4')">
        <div class="card-content">
          <h3>Creative Portfolio</h3>
          <button>Use Template</button>
        </div>
      </div>

      <div class="card" onclick="selectTemplate('template5')">
        <div class="card-content">
          <h3>Dark Portfolio</h3>
          <button>Use Template</button>
        </div>
      </div>

      <div class="card" onclick="selectTemplate('template6')">
        <div class="card-content">
          <h3>Minimal Portfolio</h3>
          <button>Use Template</button>
        </div>
      </div>
    </div>

    <script>
      function selectTemplate(template) {
        localStorage.setItem("selectedTemplate", template);
        window.location.href = "editor.html";
      }
    </script>
  </body>
</html>
