<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | Portfolio Builder</title>
    <link rel="stylesheet" href="profile.css" />
  </head>

  <body>
    <div class="app">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="user-info">
          <img
            src="https://img.freepik.com/premium-vector/portrait-business-woman_505024-2799.jpg?semt=ais_hybrid&w=740&q=80"
          />
          <div class="user-text">
            <h3>SAKSHI</h3>
            <span>Portfolio Creator</span>
          </div>
        </div>
        <nav>
          <a href="dashboard.html">Home</a>
          <a href="templates.html">Templates</a>
          <a href="builder.html">Build Resume</a>
          <a class="active" href="profile.html">Profile</a>
          <a href="contact.html">Contact</a>
          <a href="about.html">About</a>
          <a href="faq.html">FAQ</a>
        </nav>
        <button class="logout" onclick="logoutUser()">Logout</button>
      </aside>

      <!-- Main Content -->
      <main class="content">
        <section class="page-intro">
          <h2>Profile Management</h2>
           <p class="subtitle">Edit and save your account details anytime.</p>
        </section>

        <section class="profile-section">
          <div class="profile-card">
            <h3>Profile Information</h3>

            <!-- ✅ SINGLE FORM -->
             <div id="messageBox" class="message"></div>
            <form id="profileForm">
              <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required />
              </div>

              <div class="form-group">
                <label for="email">Email</label>
                <input
                  type="email"
                  id="email"
                  placeholder="john@example.com"
                  required
                />
              </div>

              <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" />
              </div>

              
              <button type="submit" class="Save">Save Profile</button>
            </form>
          </div>
        </section>
      </main>
    </div>

    <!-- ✅ SUCCESS MESSAGE SCRIPT -->
    <scrip>
      <scrip>
<script>
document.getElementById("profileForm").addEventListener("submit", async function (e) {
  e.preventDefault();

  const messageBox = document.getElementById("messageBox");

  const data = {
    user_id: 1,
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  };

  try {
    const res = await fetch("http://localhost:5000/profile", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    // ✅ Show Success or Error Message
    messageBox.className = "message"; // reset
    messageBox.classList.add(result.success ? "success" : "error");
    messageBox.textContent = result.message;

    if (result.success) {
      document.getElementById("profileForm").reset();
    }

  } catch (err) {
    console.log(err);

    messageBox.className = "message error";
    messageBox.textContent = "Something went wrong ❌";
  }
});
function logoutUser() {
  localStorage.clear();
  sessionStorage.clear();
  window.location.href = "home.html";
}


    </script>
  </body>
</html>
